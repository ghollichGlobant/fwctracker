<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://fwctracker.onrender.com http://localhost:3000; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self';">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="X-Frame-Options" content="DENY">
<meta name="referrer" content="no-referrer">
<title>⚽ Facundo's FIFA World Cup 2026 Sticker Album Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Inter:wght@400;500;600;700&display=swap');

  :root {
is     --pitch-green: #4db8ff;
    --pitch-light: #8ed6ff;
    --pitch-dark: #0d2233;
    --gold: #ffd60a;
    --gold-dark: #c7a500;
    --white: #ffffff;
    --missing-bg: #1b2a38;
    --missing-border: #3d5970;
    --complete-bg: #1b5e20;
    --complete-border: #4caf50;
    --repeated-bg: #b68b00;
    --repeated-border: #ffd60a;
    --card-bg: #101820;
    --card-border: #2a3b4d;
    --bg-dark: #060b11;
    --text-primary: #f5fbff;
    --text-secondary: #b6c7d8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-dark);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    background: linear-gradient(135deg, var(--pitch-dark), var(--pitch-green), var(--pitch-dark));
    border-bottom: 4px solid var(--gold);
    padding: 32px 24px 28px;
    text-align: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .header .ball-icon { font-size: 3rem; display: block; margin-bottom: 8px; }
  .header h1 {
    font-family: 'Russo One', sans-serif;
    font-size: 1.8rem;
    color: var(--white);
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    margin-bottom: 4px;
  }
  .header .owner-badge {
    display: inline-block;
    background: var(--gold);
    color: var(--pitch-dark);
    padding: 4px 16px;
    border-radius: 20px;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 0.5px;
    margin-top: 4px;
  }

  .content {
    flex: 1;
    max-width: 700px;
    width: 100%;
    margin: 0 auto;
    padding: 32px 24px 60px;
  }

  /* PROGRESS RING */
  .progress-section {
    text-align: center;
    margin-bottom: 32px;
  }
  .progress-ring-wrap {
    position: relative;
    display: inline-block;
    margin-bottom: 12px;
  }
  .progress-ring-wrap svg {
    transform: rotate(-90deg);
  }
  .progress-ring-bg {
    fill: none;
    stroke: rgba(255,255,255,0.08);
    stroke-width: 14;
  }
  .progress-ring-fill {
    fill: none;
    stroke: url(#progressGrad);
    stroke-width: 14;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s ease;
  }
  .progress-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }
  .progress-pct {
    font-family: 'Russo One', sans-serif;
    font-size: 2.4rem;
    color: var(--gold);
    line-height: 1;
  }
  .progress-label {
    font-size: 0.75rem;
    color: var(--text-secondary);
    margin-top: 2px;
  }
  .progress-subtitle {
    font-size: 0.85rem;
    color: var(--text-secondary);
  }

  /* STAT BOXES */
  .stats-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }
  .stat-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 16px 24px;
    text-align: center;
    min-width: 130px;
    flex: 1;
    max-width: 200px;
  }
  .stat-card .stat-emoji { font-size: 1.5rem; display: block; margin-bottom: 4px; }
  .stat-card .stat-value {
    font-family: 'Russo One', sans-serif;
    font-size: 1.6rem;
    line-height: 1.2;
  }
  .stat-card .stat-label {
    font-size: 0.7rem;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 2px;
  }
  .stat-card.complete .stat-value { color: #4caf50; }
  .stat-card.repeated .stat-value { color: #ff9800; }
  .stat-card.missing .stat-value { color: #78909c; }

  /* NAV BUTTONS */
  .nav-buttons {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .nav-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 24px;
    border-radius: 14px;
    border: 2px solid var(--card-border);
    background: var(--card-bg);
    color: var(--text-primary);
    text-decoration: none;
    font-size: 1rem;
    font-weight: 600;
    transition: all 0.2s;
  }
  .nav-btn:hover {
    border-color: var(--gold);
    background: #141e28;
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }
  .nav-btn .nav-icon {
    font-size: 1.8rem;
    flex-shrink: 0;
  }
  .nav-btn .nav-text { flex: 1; }
  .nav-btn .nav-text .nav-title { display: block; }
  .nav-btn .nav-text .nav-desc {
    display: block;
    font-size: 0.75rem;
    font-weight: 400;
    color: var(--text-secondary);
    margin-top: 2px;
  }
  .nav-btn .nav-arrow {
    font-size: 1.2rem;
    color: var(--text-secondary);
    transition: color 0.2s;
  }
  .nav-btn:hover .nav-arrow { color: var(--gold); }

  /* LOADING / ERROR */
  .loading-state, .error-state {
    text-align: center;
    padding: 60px 24px;
  }
  .loading-state { color: var(--text-secondary); }
  .error-state { color: #ef5350; }
  .error-state button {
    margin-top: 16px;
    padding: 10px 24px;
    border-radius: 10px;
    border: none;
    background: var(--pitch-green);
    color: white;
    font-weight: 600;
    cursor: pointer;
    font-size: 0.9rem;
  }
  .error-state button:hover { opacity: 0.9; }

  .spinner {
    display: inline-block;
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,0.15);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .footer {
    text-align: center;
    padding: 24px;
    color: var(--text-secondary);
    font-size: 0.75rem;
    border-top: 1px solid var(--card-border);
  }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg-dark); }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

  @media (max-width: 768px) {
    .header h1 { font-size: 1.3rem; }
    .header { padding: 24px 16px 20px; }
    .content { padding: 24px 16px 60px; }
    .progress-pct { font-size: 1.8rem; }
    .stat-card { min-width: 90px; padding: 12px 14px; }
    .stat-card .stat-value { font-size: 1.3rem; }
    .nav-btn { padding: 14px 18px; }
  }
</style>
</head>
<body>

<header class="header">
  <span class="ball-icon">⚽</span>
  <h1>FIFA World Cup 2026™ Sticker Tracker</h1>
  <span class="owner-badge">📋 Facundo's Album</span>
</header>

<div class="content" id="content">
  <div class="loading-state" id="loadingState">
    <div class="spinner"></div>
    <div>Loading album stats…</div>
  </div>
</div>

<footer class="footer">
  ⚽ Panini FIFA World Cup 2026™ Sticker Album Tracker — Owner: Facundo — 980 Stickers · 48 Teams · 12 Groups<br>
  Data verified against official Panini sources, si.com, Scanini, and FourFourTwo · May 2026
</footer>

<script>
const ALBUM_ID = "IH9Jdy8LImq5dXkKHLnh";
const API_BASE = "https://fwctracker.onrender.com";

async function fetchStats() {
  try {
    const res = await fetch(`${API_BASE}/api/albums/${ALBUM_ID}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    renderDashboard(data);
  } catch (err) {
    document.getElementById("content").innerHTML = `
      <div class="error-state">
        ❌ Could not load album stats<br>
        <small>${err.message}</small>
        <br><button onclick="location.reload()">🔄 Retry</button>
      </div>`;
  }
}

function renderDashboard(data) {
  const stats = data.stats || {};
  const total = stats.total || 980;
  // "owned" = complete + repeated (both count as having the sticker)
  const owned = (stats.complete || 0) + (stats.repeated || 0);
  const pct = total > 0 ? Math.round((owned / total) * 100) : 0;
  const missing = stats.missing || 0;
  const repeated = stats.repeated || 0;
  const totalRepeats = stats.totalRepeats || 0;

  // SVG ring calculation
  const radius = 80;
  const circumference = 2 * Math.PI * radius;
  const dashOffset = circumference - (pct / 100) * circumference;

  document.getElementById("content").innerHTML = `
    <div class="progress-section">
      <div class="progress-ring-wrap">
        <svg width="200" height="200" viewBox="0 0 200 200">
          <defs>
            <linearGradient id="progressGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#4db8ff"/>
              <stop offset="50%" stop-color="#4caf50"/>
              <stop offset="100%" stop-color="#ffd60a"/>
            </linearGradient>
          </defs>
          <circle class="progress-ring-bg" cx="100" cy="100" r="${radius}"/>
          <circle class="progress-ring-fill" cx="100" cy="100" r="${radius}"
            stroke-dasharray="${circumference}"
            stroke-dashoffset="${dashOffset}"/>
        </svg>
        <div class="progress-center">
          <div class="progress-pct">${pct}%</div>
          <div class="progress-label">COMPLETE</div>
        </div>
      </div>
      <div class="progress-subtitle">${owned} of ${total} stickers collected</div>
    </div>

    <div class="stats-row">
      <div class="stat-card complete">
        <span class="stat-emoji">✅</span>
        <div class="stat-value">${owned}</div>
        <div class="stat-label">Owned</div>
      </div>
      <div class="stat-card repeated">
        <span class="stat-emoji">🔄</span>
        <div class="stat-value">${repeated}</div>
        <div class="stat-label">Repeated${totalRepeats > 0 ? ` (${totalRepeats})` : ""}</div>
      </div>
      <div class="stat-card missing">
        <span class="stat-emoji">❌</span>
        <div class="stat-value">${missing}</div>
        <div class="stat-label">Missing</div>
      </div>
    </div>

    <div class="nav-buttons">
      <a href="missing.html" class="nav-btn">
        <span class="nav-icon">📋</span>
        <span class="nav-text">
          <span class="nav-title">View Missing Stickers</span>
          <span class="nav-desc">See which stickers you still need — shareable list</span>
        </span>
        <span class="nav-arrow">→</span>
      </a>
      <a href="repeated.html" class="nav-btn">
        <span class="nav-icon">🔄</span>
        <span class="nav-text">
          <span class="nav-title">View Repeated Stickers</span>
          <span class="nav-desc">Extra stickers available for trading</span>
        </span>
        <span class="nav-arrow">→</span>
      </a>
      <a href="manage.html" class="nav-btn">
        <span class="nav-icon">🔐</span>
        <span class="nav-text">
          <span class="nav-title">Manage Album</span>
          <span class="nav-desc">Mark stickers as complete, repeated, or missing</span>
        </span>
        <span class="nav-arrow">→</span>
      </a>
    </div>`;
}

fetchStats();

// Auto-refresh every 60 seconds
setInterval(fetchStats, 60000);
</script>
</body>
</html>
