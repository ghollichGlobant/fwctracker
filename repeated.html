<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://fwctracker.onrender.com http://localhost:3000; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self';">
<title>🔄 Facundo's Repeated Stickers — FIFA World Cup 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --pitch-green: #4db8ff;
    --pitch-light: #8ed6ff;
    --pitch-dark: #0d2233;
    --gold: #ffd60a;
    --gold-dark: #c7a500;
    --white: #ffffff;
    --repeated-bg: #b68b00;
    --repeated-border: #ffd60a;
    --card-bg: #101820;
    --card-border: #2a3b4d;
    --bg-dark: #060b11;
    --text-primary: #f5fbff;
    --text-secondary: #b6c7d8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-dark);
    color: var(--text-primary);
    min-height: 100vh;
  }

  .header {
    background: linear-gradient(135deg, var(--pitch-dark), var(--pitch-green), var(--pitch-dark));
    border-bottom: 4px solid var(--gold);
    padding: 20px 24px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .header h1 {
    font-family: 'Russo One', sans-serif;
    font-size: 1.6rem;
    color: var(--white);
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    margin-bottom: 4px;
  }
  .header p { color: rgba(255,255,255,0.8); font-size: 0.9rem; }

  .header-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .header-btn {
    padding: 8px 20px;
    border-radius: 10px;
    border: 2px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.1);
    color: white;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .header-btn:hover { background: rgba(255,255,255,0.2); border-color: var(--gold); color: var(--gold); }

  .summary {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    padding: 16px 24px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .summary-box {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 12px 24px;
    text-align: center;
    min-width: 120px;
  }
  .summary-box .val {
    font-family: 'Russo One', sans-serif;
    font-size: 1.5rem;
    color: #ff9800;
  }
  .summary-box .lbl { font-size: 0.75rem; color: var(--text-secondary); margin-top: 2px; }

  .toolbar {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 24px 12px;
  }
  .search-box {
    width: 100%;
    max-width: 400px;
    padding: 10px 16px;
    border-radius: 10px;
    border: 2px solid var(--card-border);
    background: var(--card-bg);
    color: var(--text-primary);
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--gold); }
  .search-box::placeholder { color: var(--text-secondary); }

  .main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 24px 60px;
  }

  .album-section { margin-bottom: 24px; }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    background: linear-gradient(135deg, var(--card-bg), #1e2e3e);
    border: 1px solid var(--card-border);
    border-radius: 14px 14px 0 0;
  }
  .section-title {
    font-family: 'Russo One', sans-serif;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .group-badge {
    background: var(--gold);
    color: var(--pitch-dark);
    padding: 2px 10px;
    border-radius: 6px;
    font-size: 0.75rem;
    font-weight: 700;
  }
  .section-count { font-size: 0.85rem; color: var(--text-secondary); }
  .section-body {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-top: none;
    border-radius: 0 0 14px 14px;
    padding: 16px;
  }

  .team-block { margin-bottom: 16px; }
  .team-block:last-child { margin-bottom: 0; }
  .team-name {
    font-weight: 700;
    font-size: 0.95rem;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-primary);
  }
  .team-name .flag { font-size: 1.3rem; }
  .team-name .team-count {
    font-size: 0.75rem;
    color: var(--text-secondary);
    margin-left: auto;
  }

  .sticker-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: 8px;
  }
  .sticker {
    position: relative;
    border-radius: 10px;
    padding: 10px 6px;
    text-align: center;
    border: 2px solid var(--repeated-border);
    background: var(--repeated-bg);
    min-height: 72px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .sticker .sticker-code {
    font-family: 'Russo One', sans-serif;
    font-size: 0.75rem;
    margin-bottom: 2px;
  }
  .sticker .sticker-label {
    font-size: 0.6rem;
    color: rgba(255,255,255,0.7);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 100%;
  }
  .sticker .foil-badge {
    position: absolute;
    top: 3px;
    right: 5px;
    font-size: 0.6rem;
  }
  .sticker .repeat-count {
    position: absolute;
    bottom: 3px;
    right: 5px;
    background: #ff6d00;
    color: white;
    font-size: 0.55rem;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 8px;
  }

  .loading, .error-msg {
    text-align: center;
    padding: 60px 24px;
    font-size: 1.1rem;
  }
  .loading { color: var(--text-secondary); }
  .error-msg { color: #ef5350; }
  .error-msg button {
    margin-top: 16px;
    padding: 10px 24px;
    border-radius: 10px;
    border: 2px solid var(--pitch-green);
    background: var(--pitch-green);
    color: white;
    font-weight: 600;
    cursor: pointer;
  }

  .spinner {
    display: inline-block;
    width: 32px; height: 32px;
    border: 3px solid rgba(255,255,255,0.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--text-secondary);
  }
  .empty-state .big-emoji { font-size: 3rem; display: block; margin-bottom: 12px; }

  .footer {
    text-align: center;
    padding: 24px;
    color: var(--text-secondary);
    font-size: 0.75rem;
    border-top: 1px solid var(--card-border);
  }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg-dark); }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

  @media (max-width: 768px) {
    .header h1 { font-size: 1.1rem; }
    .sticker-grid { grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); gap: 6px; }
    .sticker { padding: 8px 4px; min-height: 62px; }
    .main { padding: 0 12px 60px; }
    .toolbar { padding: 0 12px 12px; }
    .summary-box { padding: 10px 16px; min-width: 90px; }
    .summary-box .val { font-size: 1.2rem; }
  }

  @media print {
    .no-print { display: none !important; }
    .header { position: static; break-after: avoid; }
    body { background: white; color: #222; }
    .sticker { border-color: #e6a100; background: #fff3cd; }
    .sticker .sticker-code { color: #222; }
    .sticker .sticker-label { color: #555; }
    .section-header { background: #eee; }
    .section-body { background: white; }
  }
</style>
</head>
<body>

<header class="header">
  <h1>🔄 Facundo's Repeated Stickers</h1>
  <p>I have extras of these — want to trade?</p>
  <div class="header-actions no-print">
    <a href="index.html" class="header-btn">🏠 Home</a>
    <button class="header-btn" onclick="window.print()">🖨️ Print / Save as PDF</button>
  </div>
</header>

<div id="content">
  <div class="loading" id="loadingState">
    <div class="spinner"></div>
    <div>Loading repeated stickers…</div>
  </div>
</div>

<footer class="footer">
  ⚽ Panini FIFA World Cup 2026™ Sticker Album — Owner: Facundo — 980 Stickers · 48 Teams · 12 Groups<br>
  This is a read-only list — let's trade! 🤝
</footer>

<script>
const ALBUM_ID = "IH9Jdy8LImq5dXkKHLnh";
const API_BASE = "https://fwctracker.onrender.com";

let allStickers = [];

async function fetchRepeated() {
  try {
    const res = await fetch(`${API_BASE}/api/albums/${ALBUM_ID}/stickers`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    allStickers = (data.stickers || []).filter(s => s.status === "repeated");
    renderPage(allStickers);
  } catch (err) {
    document.getElementById("content").innerHTML = `
      <div class="error-msg">
        ❌ Failed to load stickers<br>
        <small>${err.message}</small>
        <br><button onclick="location.reload()">🔄 Retry</button>
      </div>`;
  }
}

function renderPage(stickers) {
  if (stickers.length === 0) {
    document.getElementById("content").innerHTML = `
      <div class="empty-state">
        <span class="big-emoji">ℹ️</span>
        No repeated stickers yet.
      </div>`;
    return;
  }

  const grouped = groupStickers(stickers);
  const groupNames = Object.keys(grouped);
  const teamCount = Object.values(grouped).reduce((s, teams) => s + Object.keys(teams).length, 0);
  const totalCopies = stickers.reduce((s, st) => s + (st.repeats || 1), 0);

  let html = `
    <div class="summary">
      <div class="summary-box"><div class="val">${stickers.length}</div><div class="lbl">Repeated Stickers</div></div>
      <div class="summary-box"><div class="val">${totalCopies}</div><div class="lbl">Total Extra Copies</div></div>
      <div class="summary-box"><div class="val">${groupNames.length}</div><div class="lbl">Groups</div></div>
      <div class="summary-box"><div class="val">${teamCount}</div><div class="lbl">Teams</div></div>
    </div>
    <div class="toolbar no-print">
      <input type="text" class="search-box" id="searchBox" placeholder="🔍 Search sticker or team…">
    </div>
    <div class="main" id="stickerContent">`;

  html += renderGroupedStickers(grouped);
  html += `</div>`;

  document.getElementById("content").innerHTML = html;

  document.getElementById("searchBox").addEventListener("input", function () {
    const q = this.value.trim().toLowerCase();
    const filtered = q
      ? allStickers.filter(s => s.code.toLowerCase().includes(q) || (s.label || "").toLowerCase().includes(q) || (s.teamName || "").toLowerCase().includes(q))
      : allStickers;
    document.getElementById("stickerContent").innerHTML = renderGroupedStickers(groupStickers(filtered));
  });
}

function groupStickers(stickers) {
  const grouped = {};
  stickers.forEach(s => {
    const groupKey = s.group || "Special";
    const teamKey = s.team || "FWC";
    if (!grouped[groupKey]) grouped[groupKey] = {};
    if (!grouped[groupKey][teamKey]) grouped[groupKey][teamKey] = { stickers: [], teamName: s.teamName || "FIFA World Cup 2026", flag: s.flag || "⭐" };
    grouped[groupKey][teamKey].stickers.push(s);
  });
  Object.values(grouped).forEach(teams => {
    Object.values(teams).forEach(t => {
      t.stickers.sort((a, b) => {
        const numA = parseInt(a.code.split(" ").pop()) || 0;
        const numB = parseInt(b.code.split(" ").pop()) || 0;
        return numA - numB;
      });
    });
  });
  return grouped;
}

function renderGroupedStickers(grouped) {
  const groupOrder = ["Special", "Group A", "Group B", "Group C", "Group D", "Group E", "Group F", "Group G", "Group H", "Group I", "Group J", "Group K", "Group L"];
  const sortedGroups = Object.keys(grouped).sort((a, b) => {
    const ia = groupOrder.indexOf(a), ib = groupOrder.indexOf(b);
    return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
  });

  if (sortedGroups.length === 0) {
    return `<div class="empty-state">No stickers match your search.</div>`;
  }

  let html = "";
  sortedGroups.forEach(groupName => {
    const teams = grouped[groupName];
    const badge = groupName === "Special" ? "⭐" : groupName.replace("Group ", "");
    const groupCount = Object.values(teams).reduce((s, t) => s + t.stickers.length, 0);

    let teamsHtml = "";
    Object.entries(teams).forEach(([, teamData]) => {
      teamsHtml += `
        <div class="team-block">
          <div class="team-name">
            <span class="flag">${teamData.flag}</span>
            ${teamData.teamName}
            <span class="team-count">${teamData.stickers.length} sticker${teamData.stickers.length > 1 ? "s" : ""}</span>
          </div>
          <div class="sticker-grid">
            ${teamData.stickers.map(s => {
              const foil = s.foil ? `<span class="foil-badge">✨</span>` : "";
              const repeats = s.repeats > 0 ? `<span class="repeat-count">×${s.repeats}</span>` : "";
              return `<div class="sticker" title="${s.code} — ${s.label || ""}">
                ${foil}
                <div class="sticker-code">${s.code}</div>
                <div class="sticker-label">${s.label || ""}</div>
                ${repeats}
              </div>`;
            }).join("")}
          </div>
        </div>`;
    });

    html += `
      <div class="album-section">
        <div class="section-header">
          <div class="section-title">
            <span class="group-badge">${badge}</span>
            ⚽ ${groupName === "Special" ? "FIFA World Cup 2026 — Special Stickers" : groupName}
          </div>
          <span class="section-count">${groupCount} sticker${groupCount > 1 ? "s" : ""}</span>
        </div>
        <div class="section-body">${teamsHtml}</div>
      </div>`;
  });

  return html;
}

fetchRepeated();
</script>
</body>
</html>
